[workspace]
members = ["kasane", "kasane-core", "kasane-tui", "kasane-macros"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
kasane-core = { path = "kasane-core" }
kasane-tui = { path = "kasane-tui" }
kasane-macros = { path = "kasane-macros" }
syn = { version = "2", features = ["full", "extra-traits"] }
quote = "1"
proc-macro2 = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
simd-json = "0.14"
crossterm = "0.28"
crossbeam-channel = "0.5"
thiserror = "2"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
unicode-width = "0.2"
insta = "1"
criterion = { version = "0.5", features = ["html_reports"] }
toml = "0.8"
bitflags = "2"
compact_str = "0.9"

[profile.profiling]
inherits = "release"
debug = true
strip = false
