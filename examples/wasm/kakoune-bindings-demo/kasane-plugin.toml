[plugin]
id = "kakoune_bindings_demo"
abi_version = "4.1.0"

# ADR-042 Phase B Step 3: opt into host-side command-error wrapping.
# Every Command::EvalCommand this plugin emits is auto-wrapped with a
# Kakoune try…catch that fires a marker info_show on failure; the host
# parses the marker and dispatches the error back to this plugin's
# on-command-error-effects export.
[handlers]
command_error_observability = true
