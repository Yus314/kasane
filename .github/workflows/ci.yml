name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Build
        run: nix develop --command cargo build

      - name: Build (with GUI)
        run: nix develop --command cargo build --features gui

      - name: Test
        run: nix develop --command cargo test

      - name: Clippy
        run: nix develop --command cargo clippy -- -D warnings

      - name: Clippy (with GUI)
        run: nix develop --command cargo clippy --features gui -- -D warnings

      - name: WIT sync check
        run: |
          diff kasane-wasm/wit/plugin.wit kasane-plugin-sdk/wit/plugin.wit
          diff kasane-wasm/wit/plugin.wit kasane-plugin-sdk-macros/wit/plugin.wit

      - name: Format check
        run: nix develop --command cargo fmt --check
