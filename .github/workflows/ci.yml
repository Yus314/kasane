name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - uses: DeterminateSystems/magic-nix-cache-action@v9

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - name: Build
        run: nix develop --command cargo build

      - name: Build (with GUI)
        run: nix develop --command cargo build --features gui

      - name: Test
        run: nix develop --command cargo test

      - name: Clippy
        run: nix develop --command cargo clippy -- -D warnings

      - name: Clippy (with GUI)
        run: nix develop --command cargo clippy --features gui -- -D warnings

      - name: WIT symlink check
        run: |
          test -L kasane-plugin-sdk/wit/plugin.wit
          test -L kasane-plugin-sdk-macros/wit/plugin.wit
          test "$(readlink kasane-plugin-sdk/wit/plugin.wit)" = "../../kasane-wasm/wit/plugin.wit"
          test "$(readlink kasane-plugin-sdk-macros/wit/plugin.wit)" = "../../kasane-wasm/wit/plugin.wit"

      - name: AUR SRCINFO consistency check
        run: |
          cd contrib/aur/kasane-bin
          # Extract values from PKGBUILD
          PKGVER=$(grep -m1 '^pkgver=' PKGBUILD | cut -d= -f2)
          PKGREL=$(grep -m1 '^pkgrel=' PKGBUILD | cut -d= -f2)
          X86_HASH=$(grep '^sha256sums_x86_64=' PKGBUILD | grep -oP "'[a-f0-9]{64}'" | tr -d "'")
          AARCH64_HASH=$(grep '^sha256sums_aarch64=' PKGBUILD | grep -oP "'[a-f0-9]{64}'" | tr -d "'")

          # Verify .SRCINFO matches
          err=0
          grep -q "pkgver = ${PKGVER}" .SRCINFO || { echo "FAIL: pkgver mismatch"; err=1; }
          grep -q "pkgrel = ${PKGREL}" .SRCINFO || { echo "FAIL: pkgrel mismatch"; err=1; }
          grep -q "sha256sums_x86_64 = ${X86_HASH}" .SRCINFO || { echo "FAIL: sha256sums_x86_64 mismatch"; err=1; }
          grep -q "sha256sums_aarch64 = ${AARCH64_HASH}" .SRCINFO || { echo "FAIL: sha256sums_aarch64 mismatch"; err=1; }
          exit $err

      - name: Documentation consistency check
        run: tools/check-doc-consistency.sh --full

      - name: Link check (docs)
        if: matrix.os == 'ubuntu-latest'
        uses: lychee-action/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path=target
            --exclude-path=contrib
            --include-fragments
            'docs/**/*.md'
            'README.md'
          fail: true

      - name: Format check
        run: nix develop --command cargo fmt --check
