name: Benchmark

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.actor != 'renovate[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixpkgs-unstable

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Install iai-callgrind-runner
        run: nix develop --command cargo install iai-callgrind-runner --version 0.14.2

      - name: Run core benchmarks
        run: nix develop --command cargo bench --bench rendering_pipeline -- --output-format bencher --warm-up-time 3 --measurement-time 5 | tee output.txt

      - name: Run TUI benchmarks
        run: nix develop --command cargo bench -p kasane-tui --bench backend -- --output-format bencher --warm-up-time 3 --measurement-time 5 | tee -a output.txt

      - name: Run replay benchmarks
        run: nix develop --command cargo bench --bench replay -- --output-format bencher --warm-up-time 3 --measurement-time 5 | tee -a output.txt

      - name: Run GUI CPU benchmarks
        run: nix develop --command cargo bench -p kasane-gui --bench cpu_rendering -- --output-format bencher --warm-up-time 3 --measurement-time 5 | tee -a output.txt

      - name: Run WASM benchmarks
        run: nix develop --command cargo bench -p kasane-wasm-bench -- --output-format bencher --warm-up-time 3 --measurement-time 5 | tee -a output.txt

      - name: Run iai-callgrind benchmarks
        run: nix develop --command env PATH="$HOME/.cargo/bin:$PATH" IAI_CALLGRIND_RUNNER="$HOME/.cargo/bin/iai-callgrind-runner" cargo bench --bench iai_pipeline 2>&1 | tee iai_results.txt

      - name: Run allocation budget
        run: |
          nix develop --command cargo run -p kasane-core --bin alloc_budget --features bench-alloc | tee alloc_budget.json
          echo "Allocation budget:"
          cat alloc_budget.json

      - name: Check allocation budget
        run: |
          FULL_COUNT=$(jq '.full_frame.count' alloc_budget.json)
          echo "full_frame allocation count: $FULL_COUNT"
          if [ "$FULL_COUNT" -gt 150 ]; then
            echo "::error::Allocation count regressed: $FULL_COUNT > 150 (SLO: < 150 allocs)"
            exit 1
          fi

      - name: Check performance.md staleness
        continue-on-error: true
        run: |
          tools/update-measurements.sh --check --only slo,alloc_breakdown 2>&1 || {
            echo "::warning::performance.md measurement tables are stale. Run: tools/update-measurements.sh"
          }

      - name: Check latency budgets
        run: nix develop --command cargo test -p kasane-core --test latency_budget -- --ignored

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Kasane Rendering Pipeline
          tool: cargo
          output-file-path: output.txt
          alert-threshold: "115%"
          comment-on-alert: true
          fail-on-alert: false
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: dev/bench

      - name: Upload iai-callgrind results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iai-callgrind-results
          path: iai_results.txt
          retention-days: 90
