name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: x86_64-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            name: x86_64-linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            name: aarch64-linux-gnu
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            name: x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-14
            name: aarch64-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install GUI dependencies
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev libwayland-dev wayland-protocols \
            libxkbcommon-dev libx11-dev libxcursor-dev \
            libxrandr-dev libxi-dev libfontconfig-dev libfreetype-dev

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          FEATURES=""
          # Enable GUI for targets where GPU deps are available
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu|*-apple-darwin) FEATURES="--features gui" ;;
          esac
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release -p kasane $FEATURES --target ${{ matrix.target }}
          else
            cargo build --release -p kasane $FEATURES --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../kasane-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz kasane

      - uses: actions/upload-artifact@v7
        with:
          name: kasane-${{ matrix.name }}
          path: kasane-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum kasane-*.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            kasane-*.tar.gz
            SHA256SUMS
          generate_release_notes: true

  update-aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: kasane-*-linux-gnu
          merge-multiple: true

      - name: Compute hashes and update PKGBUILD
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          X86_HASH=$(sha256sum kasane-*-x86_64-linux-gnu.tar.gz | cut -d' ' -f1)
          AARCH64_HASH=$(sha256sum kasane-*-aarch64-linux-gnu.tar.gz | cut -d' ' -f1)
          MIT_HASH=$(sha256sum LICENSE-MIT | cut -d' ' -f1)
          APACHE_HASH=$(sha256sum LICENSE-APACHE | cut -d' ' -f1)
          contrib/aur/update.sh "$VERSION" "$X86_HASH" "$AARCH64_HASH" "$MIT_HASH" "$APACHE_HASH"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="aur/v${VERSION}"

          # Skip if branch already exists (re-run)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add contrib/aur/kasane-bin/PKGBUILD contrib/aur/kasane-bin/.SRCINFO
          git commit -m "chore(release): update kasane-bin to ${VERSION}"
          git push -u origin "$BRANCH"
          {
            echo "## Summary"
            echo ""
            echo "Auto-generated by release workflow. Updates AUR package to v${VERSION}."
            echo ""
            echo "## After merging"
            echo ""
            echo "Copy the updated files to the AUR repository and push:"
            echo ""
            echo '```bash'
            echo 'cp contrib/aur/kasane-bin/{PKGBUILD,.SRCINFO} /path/to/kasane-bin-aur/'
            echo 'cd /path/to/kasane-bin-aur'
            echo "git add -A && git commit -m \"Update to ${VERSION}\" && git push"
            echo '```'
          } > /tmp/pr-body.md
          gh pr create \
            --title "chore(release): update kasane-bin to ${VERSION}" \
            --body-file /tmp/pr-body.md

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: kasane-*-macos
          merge-multiple: true

      - name: Compute hashes and update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          X86_HASH=$(sha256sum kasane-*-x86_64-macos.tar.gz | cut -d' ' -f1)
          AARCH64_HASH=$(sha256sum kasane-*-aarch64-macos.tar.gz | cut -d' ' -f1)
          contrib/homebrew/update.sh "$VERSION" "$X86_HASH" "$AARCH64_HASH"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="homebrew/v${VERSION}"

          # Skip if branch already exists (re-run)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH already exists, skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add contrib/homebrew/kasane.rb
          git commit -m "chore(release): update Homebrew formula to ${VERSION}"
          git push -u origin "$BRANCH"
          {
            echo "## Summary"
            echo ""
            echo "Auto-generated by release workflow. Updates Homebrew formula to v${VERSION}."
            echo ""
            echo "## After merging"
            echo ""
            echo "Copy the updated formula to the homebrew-kasane tap and push:"
            echo ""
            echo '```bash'
            echo 'cp contrib/homebrew/kasane.rb /path/to/homebrew-kasane/Formula/kasane.rb'
            echo 'cd /path/to/homebrew-kasane'
            echo "git add -A && git commit -m \"kasane ${VERSION}\" && git push"
            echo '```'
          } > /tmp/pr-body.md
          gh pr create \
            --title "chore(release): update Homebrew formula to ${VERSION}" \
            --body-file /tmp/pr-body.md
