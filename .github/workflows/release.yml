name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            name: x86_64-linux-gnu
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            name: x86_64-linux-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            name: aarch64-linux-gnu
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            name: x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-14
            name: aarch64-macos

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release -p kasane --target ${{ matrix.target }}
          else
            cargo build --release -p kasane --target ${{ matrix.target }}
          fi

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../kasane-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz kasane

      - uses: actions/upload-artifact@v4
        with:
          name: kasane-${{ matrix.name }}
          path: kasane-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum kasane-*.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            kasane-*.tar.gz
            SHA256SUMS
          generate_release_notes: true
