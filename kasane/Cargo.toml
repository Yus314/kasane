[package]
name = "kasane"
version = "0.1.1"
edition.workspace = true
license.workspace = true

[features]
default = ["wasm-plugins"]
gui = ["dep:kasane-gui"]
wasm-plugins = ["dep:kasane-wasm"]

[dependencies]
kasane-core = { workspace = true }
kasane-tui = { workspace = true }
kasane-gui = { workspace = true, optional = true }
kasane-wasm = { workspace = true, optional = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }
tokio = { version = "1", features = ["rt-multi-thread", "process", "io-util", "sync", "time", "macros"] }
